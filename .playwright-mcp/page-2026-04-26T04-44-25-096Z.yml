            - heading "Navigate to header What are Agent Skills?" [level=2] [ref=e143]:
              - link "Navigate to header" [ref=e144] [cursor=pointer]:
                - /url: "#what-are-agent-skills"
                - img [ref=e146]
              - generic [ref=e148] [cursor=pointer]: What are Agent Skills?
            - generic [ref=e149]: Agent Skills are a lightweight, open format for extending AI agent capabilities with specialized knowledge and workflows.
            - generic [ref=e150]:
              - text: At its core, a skill is a folder containing a
              - code [ref=e151]: SKILL.md
              - text: file. This file includes metadata (
              - code [ref=e152]: name
              - text: and
              - code [ref=e153]: description
              - text: ", at minimum) and instructions that tell an agent how to perform a specific task. Skills can also bundle scripts, reference materials, templates, and other resources."
            - generic [ref=e154]:
              - generic [ref=e155]:
                - button "Report incorrect code" [ref=e157] [cursor=pointer]:
                  - img [ref=e158]
                - button "Copy the contents from the code block" [ref=e161] [cursor=pointer]:
                  - img [ref=e162]
                - button "Ask AI" [ref=e166] [cursor=pointer]:
                  - img [ref=e167]
              - code [ref=e173]:
                - generic [ref=e174]: my-skill/
                - generic [ref=e175]: "├── SKILL.md # Required: metadata + instructions"
                - generic [ref=e176]: "├── scripts/ # Optional: executable code"
                - generic [ref=e177]: "├── references/ # Optional: documentation"
                - generic [ref=e178]: "├── assets/ # Optional: templates, resources"
                - generic [ref=e179]: "└── ... # Any additional files or directories"
            - heading "Navigate to header Why Agent Skills?" [level=2] [ref=e180]:
              - link "Navigate to header" [ref=e181] [cursor=pointer]:
                - /url: "#why-agent-skills"
                - img [ref=e183]
              - generic [ref=e185] [cursor=pointer]: Why Agent Skills?
            - generic [ref=e186]: "Agents are increasingly capable, but often don’t have the context they need to do real work reliably. Skills solve this by packaging procedural knowledge and company-, team-, and user-specific context into portable, version-controlled folders that agents load on demand. This gives agents:"
            - list [ref=e187]:
              - listitem [ref=e188]:
                - strong [ref=e189]: Domain expertise
                - text: ": Capture specialized knowledge — from legal review processes to data analysis pipelines to presentation formatting — as reusable instructions and resources."
              - listitem [ref=e190]:
                - strong [ref=e191]: Repeatable workflows
                - text: ": Turn multi-step tasks into consistent, auditable procedures."
              - listitem [ref=e192]:
                - strong [ref=e193]: Cross-product reuse
                - text: ": Build a skill once and use it across any skills-compatible agent."
            - heading "Navigate to header How do Agent Skills work?" [level=2] [ref=e194]:
              - link "Navigate to header" [ref=e195] [cursor=pointer]:
                - /url: "#how-do-agent-skills-work"
                - img [ref=e197]
              - generic [ref=e199] [cursor=pointer]: How do Agent Skills work?
            - generic [ref=e200]:
              - text: Agents load skills through
              - strong [ref=e201]: progressive disclosure
              - text: ", in three stages:"
            - list [ref=e202]:
              - listitem [ref=e203]:
                - generic [ref=e204]:
                  - strong [ref=e205]: Discovery
                  - text: ": At startup, agents load only the name and description of each available skill, just enough to know when it might be relevant."
              - listitem [ref=e206]:
                - generic [ref=e207]:
                  - strong [ref=e208]: Activation
                  - text: ": When a task matches a skill’s description, the agent reads the full"
                  - code [ref=e209]: SKILL.md
                  - text: instructions into context.
              - listitem [ref=e210]:
                - generic [ref=e211]:
                  - strong [ref=e212]: Execution
                  - text: ": The agent follows the instructions, optionally executing bundled code or loading referenced files as needed."
            - generic [ref=e213]: Full instructions load only when a task calls for them, so agents can keep many skills on hand with only a small context footprint.
            - heading "Navigate to header Where can I use Agent Skills?" [level=2] [ref=e214]:
              - link "Navigate to header" [ref=e215] [cursor=pointer]:
                - /url: "#where-can-i-use-agent-skills"
